name: Docker Build & Publish

# Builds multi-arch (amd64 + arm64) Docker images and pushes to GHCR.
# Docker Hub sync is opt-in: only happens if DOCKERHUB_USERNAME + DOCKERHUB_TOKEN secrets exist.
#
# Chosen strategy (user selected option 1):
# - Primary: GHCR only (uses ${{ github.repository }} → ghcr.io/bluesky4485/minirouter)
# - Multi-arch enabled for Apple Silicon Mac + Linux arm64 servers
#
# Manual trigger (workflow_dispatch) supports choosing platforms:
#   - linux/amd64,linux/arm64  (default, full)
#   - linux/amd64              (faster for quick testing)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Build platforms (use amd64 only for faster manual testing)'
        required: false
        default: 'linux/amd64,linux/arm64'
        type: choice
        options:
          - 'linux/amd64,linux/arm64'
          - 'linux/amd64'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        # Only runs if you have configured the two secrets in repo settings
        if: github.event_name != 'pull_request' && secrets.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine target image names
        id: image-names
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          # Always publish to GHCR. Only add Docker Hub if the two secrets are configured.
          images="ghcr.io/${{ github.repository }}"
          if [ -n "$DOCKERHUB_USER" ]; then
            images="$images,docker.io/$DOCKERHUB_USER/minirouter"
          fi
          echo "images=$images" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-names.outputs.images }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            USE_CHINA_MIRROR=false
            NPM_REGISTRY=https://registry.npmjs.org

      - name: Image summary
        if: github.event_name != 'pull_request'
        run: |
          echo "✅ Docker image published"
          echo "Platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}"
          echo "Primary registry: ghcr.io"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo ""
          echo "Apple Silicon Mac and Linux arm64 servers will automatically pull the correct architecture (when both are built)."
